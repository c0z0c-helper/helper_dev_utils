[pytest]
# pytest 설정 파일

# 테스트 검색 경로
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py

# 테스트 클래스 패턴
python_classes = Test*

# 테스트 함수 패턴
python_functions = test_*

# 마커 등록
markers =
    slow: 느린 테스트
    integration: 통합 테스트

# 출력 옵션
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
